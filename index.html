<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Обмен конспектами | Ковалиская Р.А.</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white">
  <div class="max-w-5xl mx-auto px-6 py-8">
    <div class="mb-8">
      <h1 class="text-3xl font-bold">Обмен конспектами</h1>
      <p class="text-zinc-400">ДВФУ</p>
    </div>
    <div class="flex gap-2 mb-6 border-b border-zinc-800">
      <button onclick="showTab('my-notes')" class="tab-btn active px-5 py-3 font-medium border-b-2 border-white" id="tab-my-notes">Мои конспекты</button>
      <button onclick="showTab('upload')" class="tab-btn px-5 py-3 font-medium text-zinc-400 hover:text-white" id="tab-upload">Загрузить</button>
      <button onclick="showTab('search')" class="tab-btn px-5 py-3 font-medium text-zinc-400 hover:text-white" id="tab-search">Поиск</button>
      <button onclick="showTab('contacts')" class="tab-btn px-5 py-3 font-medium text-zinc-400 hover:text-white" id="tab-contacts">Контакты</button>
    </div>
    <div id="my-notes" class="tab-content">
      <h2 class="text-xl font-semibold mb-4">Мои конспекты</h2>
      <div id="notesList" class="grid md:grid-cols-2 gap-4"></div>
    </div>
    <div id="upload" class="tab-content hidden">
      <h2 class="text-xl font-semibold mb-4">Загрузить конспект</h2>
      <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-6 max-w-xl">
        <input type="text" id="noteName" placeholder="Название конспекта" class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3 mb-3">
        <input type="text" id="subject" placeholder="Предмет" class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3 mb-4">
        <button onclick="addNote()" class="bg-white text-black px-6 py-3 rounded-xl font-medium w-full">Загрузить конспект</button>
      </div>
    </div>
    <div id="search" class="tab-content hidden">
      <h2 class="text-xl font-semibold mb-4">Поиск конспектов</h2>
      <input type="text" id="searchInput" placeholder="Введите название или предмет..." 
             class="w-full max-w-md bg-zinc-900 border border-zinc-700 rounded-xl px-4 py-3 mb-4" oninput="filterNotes()">
      <div id="searchResults" class="grid md:grid-cols-2 gap-4"></div>
    </div>
    <div id="contacts" class="tab-content hidden">
      <h2 class="text-xl font-semibold mb-4">Контакты</h2>
      <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-6 max-w-md">
        <p class="mb-1 text-zinc-400">Ковалиская Регина Андреевна</p>
        <p class="font-medium mb-4">Студентка ИМиКТ, ДВФУ</p>
        
        <div class="space-y-3 text-sm">
          <div><span class="text-zinc-400">Телефон:</span> +7 (909) 888-26-58</div>
          <div><span class="text-zinc-400">Email:</span> kovalinskaya.ra@dvfu.ru</div>
	  <div><span class="text-zinc-400">Github:</span> nektoOoo-code</div>
        </div>
      </div>
    </div>
  </div>
  <script>
    let notes = [
      { name: "Математический анализ", subject: "Математика", date: "12.06.2026" },
      { name: "Основы алгоратмизации и програмvирования", subject: "Програмvирование", date: "10.06.2026" },
      { name: "Дискретная математика", subject: "Математика", date: "08.06.2026" }
    ];
    function showTab(tab) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
      document.getElementById(tab).classList.remove('hidden');
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active', 'border-b-2', 'border-white'));
      document.getElementById('tab-' + tab).classList.add('active', 'border-b-2', 'border-white');
    }
    function renderNotes(containerId = 'notesList') {
      const container = document.getElementById(containerId);
      container.innerHTML = '';

      notes.forEach((note, index) => {
        const div = document.createElement('div');
        div.className = 'bg-zinc-900 border border-zinc-800 rounded-2xl p-5';
        div.innerHTML = `
          <p class="font-semibold text-lg">${note.name}</p>
          <p class="text-emerald-400 text-sm mb-3">${note.subject}</p>
          <div class="flex justify-between items-center text-sm">
            <span class="text-zinc-400">${note.date}</span>
            <button onclick="contactOwner(${index})" class="text-emerald-400 hover:underline">Связаться</button>
          </div>
        `;
        container.appendChild(div);
      });
    }
    function addNote() {
      const name = document.getElementById('noteName').value.trim();
      const subject = document.getElementById('subject').value.trim();

      if (!name || !subject) {
        alert('Заполните все поля');
        return;
      }
      notes.unshift({
        name,
        subject,
        date: new Date().toLocaleDateString('ru-RU')
      });
      document.getElementById('noteName').value = '';
      document.getElementById('subject').value = '';
      renderNotes();
      alert('Конспект добавлен!');
    }
    function filterNotes() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      const container = document.getElementById('searchResults');
      container.innerHTML = '';
      const filtered = notes.filter(n => 
        n.name.toLowerCase().includes(query) || n.subject.toLowerCase().includes(query)
      );
      if (filtered.length === 0) {
        container.innerHTML = `<p class="text-zinc-400">Ничего не найдено</p>`;
        return;
      }
      filtered.forEach((note, index) => {
        const div = document.createElement('div');
        div.className = 'bg-zinc-900 border border-zinc-800 rounded-2xl p-5';
        div.innerHTML = `
          <p class="font-semibold">${note.name}</p>
          <p class="text-emerald-400 text-sm">${note.subject}</p>
          <button onclick="contactOwner(${notes.indexOf(note)})" class="mt-3 text-sm text-emerald-400">Связаться с автором</button>
        `;
        container.appendChild(div);
      });
    }
    function contactOwner(index) {
      const note = notes[index];
      alert(`Связаться по поводу: "${note.name}"\n\nТел: +7 (909) 888-26-58\nEmail: kovalinskaya.ra@dvfu.ru`);
    }
    function init() {
      renderNotes('notesList');
      showTab('my-notes');
    }
    init();
  </script>
</body>
</html>
